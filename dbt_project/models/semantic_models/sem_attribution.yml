semantic_models:
  - name: attribution_first_touch
    description: First-touch attribution records, one row per credited touchpoint.
    model: ref('fact_attribution_first_touch')
    defaults:
      agg_time_dimension: metric_date
    entities:
      - name: attribution_record
        type: primary
        expr: concat(conversion_id, '|', touchpoint_id)
      - name: conversion
        type: foreign
        expr: conversion_id
      - name: campaign
        type: foreign
        expr: campaign_id
    dimensions:
      - name: metric_date
        expr: current_date()
        type: time
        type_params:
          time_granularity: day
      - name: channel
        type: categorical
      - name: campaign_id
        type: categorical
    measures:
      - name: attributed_conversions_first_touch
        expr: conversion_id
        agg: count_distinct
      - name: attributed_revenue_first_touch
        expr: attributed_revenue
        agg: sum

